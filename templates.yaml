welcome: |-
  Welcome! The `Testnet Validator Candidate` role has been assigned.

  You now have access to `#testnet-onboarding`. Read the pinned instructions and complete the challenge. Once the node and application are ready, run `/submit-request` in `#testnet-onboarding` and provide only the operator address.

acknowledge: |-
  Thanks, we received the operator address submitted with `/submit-request`. The Gno team will review it against the published criteria and reply.

request_missing_info: |-
  Thanks. Before we can finish the review, please correct:

  {{range $i, $item := .Items}}{{if $i}}
  {{end}}- `{{$item}}`{{end}}

  After fixing it, run `/submit-request` again and provide only the operator address.

approve: |-
  Congratulations, you passed the reviewers' onboarding check. Your application has been forwarded to the GovDAO.

  Next: the GovDAO must admit your validator to the active set. Once your validator appears in the active set, the bot automatically grants you the `Testnet Validator` role and notifies you. New external validators start with voting power `1` and may earn more later through a separate, documented process.

activated: |-
  Your validator is now in the active set — the GovDAO has admitted it, and the bot has granted you the `Testnet Validator` role. Welcome aboard!

decline: |-
  Thanks for completing the challenge. We cannot approve this application because the following published criteria are not met:

  {{range $i, $c := .Criteria}}{{if $i}}
  {{end}}- `{{$c}}`{{end}}

  The `Testnet Validator Candidate` role will now be removed.

  To apply again, restart the process from the beginning: run `/candidate-testnet` in `┋💬ㆍgeneral-chat`, complete every pinned onboarding step, then run `/submit-request` with only the operator address. The new application will be reviewed independently.

escalate_to_call: |-
  Thanks for the submission. Before we decide, we need to clarify `{{.Topic}}`. Can you join a short technical call at one of these times: `{{.Options}}`? It will focus on `{{.Scope}}`.
